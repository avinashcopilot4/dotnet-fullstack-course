name: Convert Markdown to PDF

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**.md'
  workflow_dispatch:

jobs:
  convert-md-to-pdf:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Convert markdown to PDF
        run: |
          find . -name "*.md" -type f ! -path "./node_modules/*" ! -path "./.git/*" ! -path "*README*" | while read md_file; do
            pdf_file="${md_file%.md}.pdf"
            echo "Converting: $md_file → $pdf_file"
            pandoc "$md_file" -o "$pdf_file" -V margin-top=20mm -V margin-bottom=20mm -V margin-left=15mm -V margin-right=15mm
          done

      - name: Commit PDFs
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "**/*.pdf"
          git commit -m "🤖 Auto-convert: Markdown to PDF" || echo "No changes"
          git push || echo "Nothing to push"
