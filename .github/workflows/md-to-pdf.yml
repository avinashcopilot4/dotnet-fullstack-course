name: Convert Markdown to PDF

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**.md'
  workflow_dispatch:

jobs:
  convert-md-to-pdf:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf

      - name: Convert markdown to PDF
        run: |
          find . -name "*.md" -type f ! -path "./node_modules/*" ! -path "./.git/*" ! -path "*README*" | while read md_file; do
            pdf_file="${md_file%.md}.pdf"
            echo "Converting: $md_file → $pdf_file"
            pandoc "$md_file" -o "$pdf_file" --pdf-engine=wkhtmltopdf -V margin-top=20mm -V margin-bottom=20mm -V margin-left=15mm -V margin-right=15mm
          done

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-pdfs
          path: '**/*.pdf'
