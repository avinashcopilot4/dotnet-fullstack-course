name: Convert Markdown to PDF

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  convert-md-to-pdf:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf

      - name: Convert markdown to PDF
        run: |
          find . -name "*.md" -type f ! -path "./node_modules/*" ! -path "./.git/*" ! -path "*README*" | while read md_file; do
            pdf_file="${md_file%.md}.pdf"
            echo "Converting: $md_file → $pdf_file"
            pandoc "$md_file" -o "$pdf_file" --pdf-engine=wkhtmltopdf -V margin-top=20mm -V margin-bottom=20mm -V margin-left=15mm -V margin-right=15mm
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: '🤖 Auto-convert: Markdown to PDF'
          title: 'Auto-generated PDFs from Markdown'
          body: 'Automatically converted markdown files to PDF'
          branch: auto-pdf-conversion
